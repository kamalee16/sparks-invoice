name: sparks_invoice
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  pdf: ^3.10.8
  path_provider: ^2.1.3
  open_filex: ^4.4.0
  share_plus: ^10.1.3
  fl_chart: ^0.71.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  image_picker: ^1.1.2
  firebase_storage: ^13.2.0
  cached_network_image: ^3.4.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  image: ^4.1.7

flutter_launcher_icons:
  android: true
  ios: true
  # Legacy icon (Android < 8, iOS) — use padded version for consistent safe margins
  image_path: "assets/images/spark_logo_padded.png"
  remove_alpha_ios: false
  # Adaptive icon (Android 8+) — transparent bg, padded foreground stays inside safe zone
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: "assets/images/spark_logo_padded.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/spark_logo.png
    - assets/images/spark_logo_padded.png
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
